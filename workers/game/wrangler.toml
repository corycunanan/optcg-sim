name = "optcg-game"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Local dev only — use `wrangler secret put` for production values
NEXTJS_URL = "https://optcg-sim.vercel.app"
# GAME_WORKER_SECRET and JWT_SECRET are secrets — set via:
#   wrangler secret put GAME_WORKER_SECRET
#   wrangler secret put JWT_SECRET
# For local dev, create a .dev.vars file in workers/game/ with these values.
#
# LOG_URL (optional): HTTP endpoint that receives structured JSON log events
# (pipeline steps, auth failures, effect resolution, schema misses). When
# unset, logging is a no-op for the HTTP sink but events are still printed
# to stdout (visible in `wrangler tail`). Set per environment via:
#   wrangler secret put LOG_URL

[[durable_objects.bindings]]
name = "GAME_SESSION"
class_name = "GameSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameSession"]
