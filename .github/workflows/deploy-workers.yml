name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "workers/game/**"
      - "workers/images/**"
      - ".github/workflows/deploy-workers.yml"

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      game: ${{ steps.filter.outputs.game }}
      images: ${{ steps.filter.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            game:
              - 'workers/game/**'
            images:
              - 'workers/images/**'

  deploy-game:
    needs: changes
    if: needs.changes.outputs.game == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Deploy game worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/game

  deploy-images:
    needs: changes
    if: needs.changes.outputs.images == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Deploy images worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/images
